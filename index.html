<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>For Arya ❤️</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Playfair+Display:wght@600&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      /* gradient animated background */

      body {
        font-family: "Poppins", sans-serif;
        color: white;
        overflow-x: hidden;
        background: linear-gradient(135deg, #ff758c, #ff7eb3, #ffb199, #ff6a88);
        background-size: 400% 400%;
        animation: bgMove 12s infinite alternate;
      }

      @keyframes bgMove {
        0% {
          background-position: 0% 50%;
        }
        100% {
          background-position: 100% 50%;
        }
      }

      /* sections */

      section {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 60px 20px;
        animation: fadeIn 1s ease;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(40px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* hero section */

      .hero {
        min-height: 85vh;
        position: relative;
      }

      .arya-name {
        font-family: "Playfair Display", serif;
        font-size: 70px;
        letter-spacing: 3px;
        background: linear-gradient(45deg, #fff, #ffe0e8);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        text-shadow: 0 0 20px rgba(255, 255, 255, 0.6);
        animation: glow 3s infinite alternate;
      }

      @keyframes glow {
        0% {
          text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }
        100% {
          text-shadow: 0 0 30px rgba(255, 255, 255, 0.8);
        }
      }

      .subtitle {
        font-size: 20px;
        margin-top: 15px;
        max-width: 600px;
      }

      /* scroll indicator */

      .scroll-indicator {
        position: absolute;
        bottom: 30px;
        display: flex;
        flex-direction: column;
        align-items: center;
        font-size: 14px;
        opacity: 0.8;
      }

      .mouse {
        width: 24px;
        height: 40px;
        border: 2px solid white;
        border-radius: 20px;
        position: relative;
        margin-bottom: 6px;
      }

      .mouse::before {
        content: "";
        width: 4px;
        height: 8px;
        background: white;
        position: absolute;
        top: 8px;
        left: 50%;
        transform: translateX(-50%);
        border-radius: 2px;
        animation: scrollAnim 1.5s infinite;
      }

      @keyframes scrollAnim {
        0% {
          opacity: 1;
          top: 8px;
        }
        100% {
          opacity: 0;
          top: 20px;
        }
      }

      /* gallery */

      .gallery {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 20px;
        max-width: 1000px;
        width: 100%;
        margin-top: 30px;
      }

      .gallery img {
        width: 100%;
        border-radius: 20px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
        transition: 0.4s;
      }

      .gallery img:hover {
        transform: scale(1.05);
      }

      /* video masonry layout */

      .video-masonry {
        column-count: 3;
        column-gap: 20px;
        max-width: 1000px;
        width: 100%;
        margin-top: 40px;
      }

      .video-masonry video {
        width: 100%;
        margin-bottom: 20px;
        border-radius: 20px;
        break-inside: avoid;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      }

      @media (max-width: 900px) {
        .video-masonry {
          column-count: 2;
        }
      }

      @media (max-width: 500px) {
        .video-masonry {
          column-count: 1;
        }
      }

      /* final section */

      .final {
        background: rgba(0, 0, 0, 0.25);
        backdrop-filter: blur(8px);
        border-radius: 20px;
        padding: 40px;
      }

      button {
        margin-top: 25px;
        padding: 15px 35px;
        font-size: 18px;
        border: none;
        border-radius: 40px;
        background: white;
        color: #ff4d6d;
        font-weight: 600;
        cursor: pointer;
        transition: 0.3s;
      }

      button:hover {
        transform: scale(1.08);
      }

      /* popup */

      .popup {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.7);
        display: flex;
        align-items: center;
        justify-content: center;
        visibility: hidden;
        opacity: 0;
        transition: 0.4s;
      }

      .popup.active {
        visibility: visible;
        opacity: 1;
      }

      .popup-box {
        background: white;
        color: #ff4d6d;
        padding: 40px;
        border-radius: 20px;
        font-size: 24px;
        text-align: center;
        position: relative;
        animation: pop 0.5s;
      }

      @keyframes pop {
        0% {
          transform: scale(0.5);
        }
        100% {
          transform: scale(1);
        }
      }

      .heart {
        position: absolute;
        font-size: 22px;
        animation: float 3s linear infinite;
      }

      @keyframes float {
        0% {
          transform: translateY(0);
          opacity: 1;
        }
        100% {
          transform: translateY(-200px);
          opacity: 0;
        }
      }
    </style>
  </head>

  <body>
    <section class="hero">
      <h1 class="arya-name">Arya ❤️</h1>

      <p class="subtitle">I'm sorry. But you still mean a lot to me.</p>

      <div class="scroll-indicator">
        <div class="mouse"></div>
        <p>Scroll</p>
      </div>
    </section>

    <section>
      <p>Every moment here reminds me how special you are.</p>

      <div class="gallery">
        <img src="1.jpeg" />
        <img src="3.jpeg" />
        <img src="4.jpeg" />
        <img src="5.jpeg" />
      </div>
    </section>

    <section>
      <p>Your smile is something I never want to lose.</p>

      <div class="video-masonry">
        <video autoplay muted loop playsinline src="HT1.mp4"></video>
        <video autoplay muted loop playsinline src="HT2.mp4"></video>
        <video autoplay muted loop playsinline src="HT3.mp4"></video>
        <video autoplay muted loop playsinline src="HT4.mp4"></video>
        <video autoplay muted loop playsinline src="HT5.mp4"></video>

        <video autoplay muted loop playsinline src="VT1.mp4"></video>
        <video autoplay muted loop playsinline src="6.mp4"></video>
      </div>
    </section>

    <section class="final">
      <h1>I'm Really Sorry</h1>

      <button onclick="showLove()">Forgive Me ❤️</button>
    </section>

    <div class="popup" id="popup">
      <div class="popup-box">I love you Arya ❤️</div>
    </div>

    <script>
      /* play videos only when visible */

      const videos = document.querySelectorAll("video");

      const observer = new IntersectionObserver((entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) {
            entry.target.play();
          } else {
            entry.target.pause();
          }
        });
      });

      videos.forEach((video) => observer.observe(video));

      /* popup with floating hearts */

      function showLove() {
        const popup = document.getElementById("popup");
        popup.classList.add("active");

        const box = popup.querySelector(".popup-box");

        for (let i = 0; i < 25; i++) {
          let heart = document.createElement("div");

          heart.className = "heart";
          heart.innerHTML = "❤️";

          heart.style.left = Math.random() * 300 + "px";
          heart.style.bottom = "0";

          box.appendChild(heart);

          setTimeout(() => heart.remove(), 3000);
        }
      }
    </script>
  </body>
</html>
